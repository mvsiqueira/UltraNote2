<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UltraNote</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="_content/UltraNote.UI/ultranote.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="UltraNote.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('ultranote-theme')
                    || ((window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <div id="app">
        <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--bg,#f5f3ef);font-family:system-ui,-apple-system,sans-serif;">
            <div style="font-size:22px;font-weight:600;letter-spacing:-.3px;color:var(--accent,#5b6af0)">UltraNote</div>
            <div style="font-size:12px;color:var(--text-muted,#8b8685)">Carregando…</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro inesperado.
        <a href="." class="reload">Recarregar</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
