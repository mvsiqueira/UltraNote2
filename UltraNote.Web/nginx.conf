server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Blazor WASM needs the correct MIME type for .wasm.
    types {
        application/wasm wasm;
    }
    include /etc/nginx/mime.types;

    # _framework/* files are content-hashed by the Blazor build (filename changes when the
    # content changes), so long-lived caching is safe — and this prefix match (^~) makes
    # nginx skip the no-cache regex rule below for these paths.
    location ^~ /_framework/ {
        try_files $uri =404;
    }

    # Our own JS/CSS assets (google-auth.js, ultranote*.js/css under _content/...) are NOT
    # fingerprinted, so a stale browser cache can silently keep serving an old version after
    # a deploy (e.g. calling a JS function that only exists in the new file). Force
    # revalidation so a deploy's changes always take effect.
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # appsettings.json must not be cached aggressively while iterating.
    location ~* \.(json)$ {
        add_header Cache-Control "no-cache";
    }

    # Reverse-proxies /api-note/* to the API container, stripping the prefix (trailing
    # slash on both the location and proxy_pass does this — see UltraNote.Web/Program.cs
    # for the client-side half). Lets the myQNAPcloud access path share ONE port with the
    # web app instead of a second one for the API: some corporate proxies block CONNECT
    # tunneling to non-standard HTTPS ports, so a dedicated API port isn't reliable there.
    location ^~ /api-note/ {
        proxy_pass http://app-note-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: deep links resolve to the Blazor app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
