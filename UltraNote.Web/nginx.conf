server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # nginx listens on 8080 with no idea it's actually reached via HTTPS on 443 (Cloudflare
    # Tunnel / QTS reverse proxy terminate TLS in front of it) — left at nginx's default,
    # any redirect it generates (e.g. the /ultranote rewrite below) becomes an ABSOLUTE URL
    # built from nginx's own view of scheme+host+port, i.e. http://<host>:8080/..., which
    # browsers then get sent to directly (bypassing the proxy in front, "não seguro").
    # Relative Location headers sidestep the whole problem: the browser resolves them
    # against whatever scheme/host/port it's already using.
    absolute_redirect off;

    # Unified path scheme: every production domain serves this app under /ultranote/
    # (see UltraNote.Web/Program.cs). Strip the prefix here so every location block below
    # keeps working unchanged, regardless of whether the upstream (Cloudflare Tunnel /
    # Caddy) already stripped it before forwarding — if it did, the request already
    # arrives without the prefix and this simply won't match. Legacy requests with no
    # /ultranote/ prefix at all (myQNAPcloud root route, still live during the migration)
    # are also unaffected.
    rewrite ^/ultranote$ /ultranote/ permanent;
    rewrite ^/ultranote/(.*)$ /$1 break;

    # index.html ships with <base href="/" /> (correct for local dev, served at root) —
    # rewrite it to /ultranote/ in the RESPONSE BODY here when that's where the request
    # actually came from, using $request_uri (unlike $uri above, this always reflects the
    # original request path, unaffected by the rewrite two lines up). This used to be a
    # client-side inline <script> instead; that's unreliable because a browser's preload
    # scanner starts fetching resources referenced in the HTML (the _framework/* preload
    # link, stylesheets, etc.) as soon as it sees them in the byte stream, independently of
    # and often before a same-page <script> gets to run — so it can end up requesting
    # everything against the ORIGINAL "/" base regardless of script order. Rewriting the
    # HTML itself removes the race entirely: the correct base href is there from byte one.
    set $base_href "/";
    if ($request_uri ~ "^/ultranote") {
        set $base_href "/ultranote/";
    }
    sub_filter '<base href="/" />' '<base href="$base_href" />';
    sub_filter_once on;
    sub_filter_types text/html;

    # Blazor WASM needs the correct MIME type for .wasm.
    types {
        application/wasm wasm;
    }
    include /etc/nginx/mime.types;

    # _framework/* files are content-hashed by the Blazor build (filename changes when the
    # content changes), so long-lived caching is safe — and this prefix match (^~) makes
    # nginx skip the no-cache regex rule below for these paths.
    location ^~ /_framework/ {
        try_files $uri =404;
    }

    # Our own JS/CSS assets (google-auth.js, ultranote*.js/css under _content/...) are NOT
    # fingerprinted, so a stale browser cache can silently keep serving an old version after
    # a deploy (e.g. calling a JS function that only exists in the new file). Force
    # revalidation so a deploy's changes always take effect.
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # appsettings.json must not be cached aggressively while iterating.
    location ~* \.(json)$ {
        add_header Cache-Control "no-cache";
    }

    # Reverse-proxies /api-note/* to the API container, stripping the prefix — done via an
    # explicit rewrite here (rather than proxy_pass's trailing-slash auto-stripping) because
    # that automatic form gets unreliable once the server-level /ultranote/ rewrite above has
    # already rewritten the URI once; proxy_pass with no URI part just forwards $uri verbatim,
    # so there's no ambiguity. Lets the myQNAPcloud access path share ONE port with the web
    # app instead of a second one for the API: some corporate proxies block CONNECT tunneling
    # to non-standard HTTPS ports, so a dedicated API port isn't reliable there.
    location ^~ /api-note/ {
        rewrite ^/api-note/(.*)$ /$1 break;
        proxy_pass http://app-note-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: deep links resolve to the Blazor app. index.html is the one file that
    # MUST never be served stale — it's what points the browser at the current (correctly
    # hashed) _framework/*.wasm and at ultranote-editor.js. A cached old copy quietly keeps
    # the whole app pinned to a previous deploy (wrong API URL, missing JS exports, etc.)
    # with no visible sign beyond things being subtly broken. no-store, not just no-cache:
    # this is a small file hit on every navigation, not worth risking a stale conditional-GET.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
