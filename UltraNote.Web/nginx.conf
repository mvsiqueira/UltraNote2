server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Blazor WASM needs the correct MIME type for .wasm.
    types {
        application/wasm wasm;
    }
    include /etc/nginx/mime.types;

    # SPA fallback: deep links resolve to the Blazor app.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # appsettings.json / framework files must not be cached aggressively while iterating.
    location ~* \.(json)$ {
        add_header Cache-Control "no-cache";
    }
}
